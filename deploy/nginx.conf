server {
    listen 80;
    server_name localhost; # Replace with your domain name or public EC2 IP later

    # 1. Route for Frontend Static Assets
    # Maps directly to the built vite production folder
    root /var/www/my-app/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Route for Backend Express APIs
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Enable WebSockets & Server-Sent Events for streaming logs/telemetry
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering to allow smooth streaming/SSE
        proxy_buffering off;
        proxy_cache off;
    }
}